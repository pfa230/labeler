name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Single source of truth for the project's Node (the active LTS, 24). `.nvmrc` is also what
          # `nvm use` reads locally and what the Dockerfile UI stage pins to, so dev / CI / image agree.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  build:
    needs: [rust, ui]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Used only for OCI image labels (org.opencontainers.image.*), matching the
      # single-arch build's `labels:` input. Tags are computed in the merge job.
      - name: Image labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/pfa230/labeler
          flavor: latest=false

      # Pull requests: build the single platform and load it locally so the smoke
      # test runs against the exact built image. Nothing is pushed.
      - name: Build for PR (load, no push)
        id: build_pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: labeler:test-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=labeler-${{ matrix.arch }}

      # Publish events: push the single platform by digest (no per-arch tag), so the
      # merge job can assemble a manifest list and GHCR stays free of variant tags.
      - name: Build and push by digest
        id: build_push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/pfa230/labeler,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=labeler-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=labeler-${{ matrix.arch }}

      # Same image on both paths: PR runs the loaded tag; publish runs the pushed
      # digest (the precise bytes that shipped). arm64 runs on the arm64 runner.
      - name: Smoke test (/api/health)
        env:
          IMAGE: ${{ github.event_name == 'pull_request' && format('labeler:test-{0}', matrix.arch) || format('ghcr.io/pfa230/labeler@{0}', steps.build_push.outputs.digest) }}
        run: |
          set -u
          cleanup() { docker rm -f smoke >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          if ! docker run -d -p 8080:8080 --name smoke "$IMAGE"; then
            echo "smoke test failed: container did not start"
            docker ps -a || true
            exit 1
          fi
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "smoke test failed: /api/health never became healthy"
            docker logs smoke || true
            docker ps -a || true
            exit 1
          fi

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/digests"
          echo "${{ steps.build_push.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.arch }}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Assert both digests present
        run: |
          set -euo pipefail
          count=$(find "${{ runner.temp }}/digests" -type f | wc -l | tr -d ' ')
          if [ "$count" -ne 2 ]; then
            echo "expected 2 digest files (amd64, arm64), found $count"
            ls -la "${{ runner.temp }}/digests" || true
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/pfa230/labeler
          flavor: latest=false
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and verify manifest list
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          dir="${{ runner.temp }}/digests"
          refs=()
          for f in "$dir"/*; do
            refs+=("ghcr.io/pfa230/labeler@$(cat "$f")")
          done
          tag_args=()
          while IFS= read -r t; do
            [ -n "$t" ] && tag_args+=("-t" "$t")
          done <<< "$TAGS"
          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

          primary=$(printf '%s\n' "$TAGS" | head -n1)
          echo "inspecting $primary"
          docker buildx imagetools inspect "$primary"
          archs=$(docker buildx imagetools inspect "$primary" --raw | jq -r '.manifests[].platform.architecture' | sort -u)
          echo "manifest architectures: $archs"
          echo "$archs" | grep -qx amd64 || { echo "manifest missing amd64"; exit 1; }
          echo "$archs" | grep -qx arm64 || { echo "manifest missing arm64"; exit 1; }

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          base="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          tarball="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "${base}/${tarball}" -o "${tarball}"
          curl -sSfL "${base}/gitleaks_${VERSION}_checksums.txt" -o checksums.txt
          grep "${tarball}" checksums.txt | sha256sum -c -
          tar xzf "${tarball}" gitleaks
          ./gitleaks git --redact .
