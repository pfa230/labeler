name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Single source of truth for the project's Node (the active LTS, 24). `.nvmrc` is also what
          # `nvm use` reads locally and what the Dockerfile UI stage pins to, so dev / CI / image agree.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  image:
    needs: [rust, ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/pfa230/labeler
          flavor: latest=false
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (amd64, load locally)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            labeler:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}

      - name: Smoke test (/api/health)
        run: |
          set -u
          cleanup() { docker rm -f smoke >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          if ! docker run -d -p 8080:8080 --name smoke labeler:test; then
            echo "smoke test failed: container did not start"
            docker ps -a || true
            exit 1
          fi
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "smoke test failed: /api/health never became healthy"
            docker logs smoke || true
            docker ps -a || true
            exit 1
          fi

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          base="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          tarball="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "${base}/${tarball}" -o "${tarball}"
          curl -sSfL "${base}/gitleaks_${VERSION}_checksums.txt" -o checksums.txt
          grep "${tarball}" checksums.txt | sha256sum -c -
          tar xzf "${tarball}" gitleaks
          ./gitleaks git --redact --config .gitleaks.toml .
