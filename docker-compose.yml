x-labeler-image: &labeler-image
  build: .
  image: labeler:latest
  pull_policy: build

services:
  labeler:
    <<: *labeler-image
    ports: ["${HOST_PORT:-8080}:8080"]
    environment:
      RUST_LOG: ${RUST_LOG:-labeler=info,tower_http=info}
    volumes:
      - labeler-data:/app/data
      - labeler-templates:/app/templates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD","/app/labeler","healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
volumes:
  labeler-data:
    name: labeler-data
  labeler-templates:
    name: labeler-templates
