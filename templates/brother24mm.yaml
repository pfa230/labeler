id: brother24mm
name: Brother 24mm Continuous Label
description: Continuous label roll (24mm width)
unit: mm
dpi: 300
format:
  type: single
  width:
    min: 10.0
    max: 120.0
  height: 24.0
layout:
  - type: qr
    name: code
    at: [0.0, 0.0]
    size: [24.0, 24.0]
  - type: text
    name: message
    at: [27.0, 0.0]
    size: [80.0, 24.0]
    font_size:
      min: 10.0
      max: 28.0
    multiline: true
    alignment:
      horizontal: left
      vertical: center
