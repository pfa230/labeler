id: brother12mm
name: Brother 12mm Continuous Label
description: Continuous label roll (12mm width)
unit: mm
dpi: 300
format:
  type: single
  width:
    min: 10.0
    max: 100.0
  height: 12.0
layout:
  - type: text
    name: message
    at: [0.0, 0.0]
    size: [12.0, 12.0]
    font_size: 10.0
    alignment:
      horizontal: left
      vertical: center
  - type: qr
    name: code
    at: [12.0, 0.0]
    size: [12.0, 12.0]
  - type: line
    at: [0.5, 1.0]
    size: [23.0, 0.0]
    thickness: 0.2
  - type: container
    at: [0.5, 1.5]
    size: [23.0, 10.0]
    frame:
      thickness: 0.2
      rounded: true
    items: []
