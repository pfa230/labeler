id: brother12mm
name: Brother 12mm Continuous Label
description: Continuous label roll (12mm width)
unit: mm
options: [black, red]
format:
  type: single
  width: 12.0
  height:
    min: 5.0
    max: 200.0
layout:
  black:
    - type: text
      name: message
      box: [0.0, 0.0, 12.0, 5.0]
      font_size:
        min: 6.0
        max: 12.0
      multiline: true
      alignment:
        horizontal: center
        vertical: center
  red:
    - type: text
      name: message
      box: [0.0, 0.0, 12.0, 5.0]
      font_size:
        min: 6.0
        max: 12.0
      multiline: true
      alignment:
        horizontal: center
        vertical: center
