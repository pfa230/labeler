id: brother_24mm_multiline
name: Brother 24mm Continuous Label (multiline)
description: Continuous tape, 24mm nominal (18.1mm printable at 180 dpi), multiline text with auto-length
unit: mm
dpi: 180
format:
  type: single
  width:
    min: 10.0
    max: 120.0
  height: 18.1
layout:
  - type: container
    at: [0.0, 0.0]
    size: [auto, 18.1]
    padding: 1.0
    items:
      - type: text
        name: message
        at: [0.0, 0.0]
        size: [auto, 16.1]
        font_size:
          min: 10.0
          max: 32.0
        multiline: true
        alignment:
          horizontal: center
          vertical: center
