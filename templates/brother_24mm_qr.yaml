id: brother_24mm_qr
name: Brother 24mm Continuous Label (QR + text)
description: Continuous tape, 24mm nominal (18.1mm printable at 180 dpi), QR left + text
unit: mm
dpi: 180
format:
  type: single
  width:
    min: 10.0
    max: 120.0
  height: 18.1
layout:
  - type: qr
    name: code
    at: [0.0, 0.0]
    size: [18.1, 18.1]
  - type: container
    at: [19.6, 0.0]
    size: [100.4, 18.1]
    padding: 1.0
    items:
      - type: text
        name: message
        at: [0.0, 0.0]
        size: [98.4, 16.1]
        font_size:
          min: 10.0
          max: 32.0
        multiline: true
        alignment:
          horizontal: left
          vertical: center
