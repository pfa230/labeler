id: avery5163
name: Avery 5163 2x4 Shipping Label
description: Standard shipping labels on US Letter sheets
unit: in
dpi: 300
options:
  orientation:
    - horizontal
    - vertical
  outline:
    - yes
format:
  type: sheet
  paper_width: 8.5
  paper_height: 11.0
  label_width: 4.0
  label_height: 2.0
  # Units: inches. Origin is page bottom-left.
  positions:
    - [0.18, 8.5]
    - [4.32, 8.5]
    - [0.18, 6.5]
    - [4.32, 6.5]
    - [0.18, 4.5]
    - [4.32, 4.5]
    - [0.18, 2.5]
    - [4.32, 2.5]
    - [0.18, 0.5]
    - [4.32, 0.5]
layout:
  - type: container
    option:
      outline: yes
    box: [0.0, 0.0, 4.0, 2.0]
    items:
      - type: rectangle
        box: [0.0, 0.0, 4.0, 2.0]
        thickness: 0.02
        rounded: false
  - type: container
    option:
      orientation: horizontal
    box: [0.1, 0.1, 3.9, 1.9]
    items:
      - type: qr
        name: url
        box: [0.05, 0.45, 1.65, 1.75]
        params:
          quiet_zone: 0.0
      - type: text
        name: id
        box: [0.0, 0.05, 1.7, 0.4]
        font_size: 12.0
        alignment:
          horizontal: center
          vertical: center
      - type: container
        box: [1.7, 0.0, 3.8, 1.8]
        items:
          - type: text
            name: name
            box: [0.0, 1.45, 2.1, 1.8]
            font_size: 17.0
            alignment:
              horizontal: left
              vertical: center
          - type: line
            start: { x: 0.0, y: 1.35 }
            end: { x: 2.1, y: 1.35 }
            thickness: 0.025
          - type: text
            name: tags
            box: [0.0, 0.95, 2.1, 1.25]
            font_size: 10.5
            alignment:
              horizontal: left
              vertical: center
          - type: text
            name: description
            box: [0.0, 0.0, 2.1, 0.95]
            font_size: 9.5
            multiline: true
            alignment:
              horizontal: left
              vertical: top
  - type: container
    option:
      orientation: vertical
    box: [0.1, 0.1, 3.9, 1.9]
    items:
      - type: qr
        name: url
        box: [1.3, 0.6, 2.5, 1.8]
        params:
          quiet_zone: 0.0
      - type: text
        name: id
        box: [0.0, 0.3, 3.8, 0.6]
        font_size: 8.0
        alignment:
          horizontal: center
          vertical: center
      - type: text
        name: description
        box: [0.0, 0.0, 3.8, 0.3]
        font_size: 8.0
        multiline: true
        alignment:
          horizontal: center
          vertical: center
