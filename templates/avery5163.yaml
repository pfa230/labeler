id: avery5163
name: Avery 5163 2x4 Shipping Label
description: Standard shipping labels on US Letter sheets
unit: in
dpi: 300
options:
  orientation:
    - horizontal
    - vertical
  outline:
    - yes
format:
  type: sheet
  paper_width: 8.5
  paper_height: 11.0
  label_width: 4.0
  label_height: 2.0
  # Units: inches. Origin is page bottom-left.
  positions:
    - [0.18, 8.5]
    - [4.32, 8.5]
    - [0.18, 6.5]
    - [4.32, 6.5]
    - [0.18, 4.5]
    - [4.32, 4.5]
    - [0.18, 2.5]
    - [4.32, 2.5]
    - [0.18, 0.5]
    - [4.32, 0.5]
layout:
  - type: container
    option:
      outline: yes
    at: [0.0, 0.0]
    size: [4.0, 2.0]
    frame:
      thickness: 0.02
      rounded: false
    items: []
  - type: container
    option:
      orientation: horizontal
    at: [0.1, 0.1]
    size: [3.8, 1.8]
    items:
      - type: qr
        name: url
        at: [0.0, 0.35]
        size: [1.45, 1.45]
        params:
          quiet_zone: 0.0
      - type: text
        name: id
        at: [0.0, 0.0]
        size: [1.45, 0.35]
        font_size: 12.0
        alignment:
          horizontal: center
          vertical: center
      - type: line
        at: [1.45, 0.0]
        size: [0.0, 1.8]
        thickness: 0.02
      - type: container
        at: [1.45, 0.0]
        size: [2.35, 1.8]
        items:
          - type: text
            name: name
            at: [0.0, 1.45]
            size: [2.35, 0.35]
            font_size: 17.0
            alignment:
              horizontal: left
              vertical: center
          - type: line
            at: [0.0, 1.35]
            size: [2.35, 0.0]
            thickness: 0.025
          - type: text
            name: tags
            at: [0.0, 0.95]
            size: [2.35, 0.3]
            font_size: 10.5
            alignment:
              horizontal: left
              vertical: center
          - type: text
            name: description
            at: [0.0, 0.0]
            size: [2.35, 0.95]
            font_size: 9.5
            multiline: true
            alignment:
              horizontal: left
              vertical: top
  - type: container
    option:
      orientation: vertical
    at: [0.1, 0.1]
    size: [3.8, 1.8]
    items:
      - type: qr
        name: url
        at: [1.3, 0.6]
        size: [1.2, 1.2]
        params:
          quiet_zone: 0.0
      - type: text
        name: id
        at: [0.0, 0.3]
        size: [3.8, 0.3]
        font_size: 8.0
        alignment:
          horizontal: center
          vertical: center
      - type: text
        name: description
        at: [0.0, 0.0]
        size: [3.8, 0.3]
        font_size: 8.0
        multiline: true
        alignment:
          horizontal: center
          vertical: center
